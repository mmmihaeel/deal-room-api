<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #F5F7FB; }
      .panel { fill: #FFFFFF; stroke: #D9E1EC; stroke-width: 1.5; }
      .title { fill: #0F172A; font: 700 34px 'Segoe UI', Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 18px 'Segoe UI', Arial, sans-serif; }
      .step { fill: #0F172A; font: 700 18px 'Segoe UI', Arial, sans-serif; }
      .body { fill: #475569; font: 400 14px 'Segoe UI', Arial, sans-serif; }
      .mini { fill: #64748B; font: 600 12px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .cardTitle { fill: #0F172A; font: 700 20px 'Segoe UI', Arial, sans-serif; }
      .cardText { fill: #475569; font: 400 14px 'Segoe UI', Arial, sans-serif; }
      .edge { stroke: #94A3B8; stroke-width: 3; stroke-linecap: round; }
      .chipText { fill: #0F172A; font: 600 14px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720" rx="36"/>
  <rect x="24" y="24" width="1232" height="672" rx="32" class="panel"/>
  <text x="64" y="84" class="title">Access model and security flow</text>
  <text x="64" y="116" class="subtitle">Membership establishes the boundary. Roles and selected room grants decide what happens next.</text>

  <rect x="74" y="160" width="226" height="92" rx="24" fill="#D7F8EE" stroke="#B7EBD7" stroke-width="1.5"/>
  <rect x="348" y="160" width="226" height="92" rx="24" fill="#DBEAFE" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="622" y="160" width="226" height="92" rx="24" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="896" y="160" width="300" height="92" rx="24" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="100" y="196" class="mini" fill="#0F766E">Step 1</text>
  <text x="100" y="224" class="step">Organization membership</text>
  <text x="100" y="243" class="body">No membership means no protected access.</text>
  <text x="374" y="196" class="mini" fill="#1D4ED8">Step 2</text>
  <text x="374" y="224" class="step">Role baseline</text>
  <text x="374" y="243" class="body">Owner, admin, member, viewer.</text>
  <text x="648" y="196" class="mini">Step 3</text>
  <text x="648" y="224" class="step">Room-level grants</text>
  <text x="648" y="243" class="body">Upload, share, manage can elevate.</text>
  <text x="922" y="196" class="mini" fill="#B45309">Step 4</text>
  <text x="922" y="224" class="step">Public share-link controls</text>
  <text x="922" y="243" class="body">Hash, expiry, revoke, limit, throttle, audit.</text>

  <line x1="300" y1="206" x2="348" y2="206" class="edge"/>
  <polygon points="348,206 336,199 336,213" fill="#94A3B8"/>
  <line x1="574" y1="206" x2="622" y2="206" class="edge"/>
  <polygon points="622,206 610,199 610,213" fill="#94A3B8"/>
  <line x1="848" y1="206" x2="896" y2="206" class="edge"/>
  <polygon points="896,206 884,199 884,213" fill="#94A3B8"/>

  <rect x="64" y="330" width="224" height="250" rx="28" class="panel"/>
  <rect x="316" y="330" width="224" height="250" rx="28" class="panel"/>
  <rect x="568" y="330" width="224" height="250" rx="28" class="panel"/>
  <rect x="820" y="330" width="224" height="250" rx="28" class="panel"/>

  <text x="138" y="374" class="cardTitle">Owner</text>
  <text x="102" y="407" class="cardText">Full organization control, including</text>
  <text x="108" y="427" class="cardText">delete and membership management.</text>
  <rect x="96" y="458" width="88" height="32" rx="16" fill="#D7F8EE"/>
  <rect x="192" y="458" width="72" height="32" rx="16" fill="#DBEAFE"/>
  <rect x="96" y="500" width="102" height="32" rx="16" fill="#E2E8F0"/>
  <text x="120" y="479" class="chipText">Org</text>
  <text x="211" y="479" class="chipText">Audit</text>
  <text x="121" y="521" class="chipText">Sharing</text>

  <text x="392" y="374" class="cardTitle">Admin</text>
  <text x="352" y="407" class="cardText">Operational control without</text>
  <text x="365" y="427" class="cardText">organization delete authority.</text>
  <rect x="348" y="458" width="120" height="32" rx="16" fill="#D7F8EE"/>
  <rect x="476" y="458" width="52" height="32" rx="16" fill="#DBEAFE"/>
  <rect x="348" y="500" width="126" height="32" rx="16" fill="#E2E8F0"/>
  <text x="374" y="479" class="chipText">Memberships</text>
  <text x="491" y="479" class="chipText">Rooms</text>
  <text x="379" y="521" class="chipText">Documents</text>

  <text x="631" y="374" class="cardTitle">Member</text>
  <text x="603" y="407" class="cardText">Reads organization scope and works</text>
  <text x="607" y="427" class="cardText">with documents and share links.</text>
  <rect x="600" y="458" width="104" height="32" rx="16" fill="#DBEAFE"/>
  <rect x="712" y="458" width="64" height="32" rx="16" fill="#E2E8F0"/>
  <rect x="600" y="500" width="102" height="32" rx="16" fill="#D7F8EE"/>
  <text x="628" y="479" class="chipText">Read</text>
  <text x="729" y="479" class="chipText">Write</text>
  <text x="624" y="521" class="chipText">Share</text>

  <text x="882" y="374" class="cardTitle">Viewer</text>
  <text x="856" y="407" class="cardText">Read-only baseline until a room</text>
  <text x="872" y="427" class="cardText">grant expands behavior.</text>
  <rect x="852" y="458" width="94" height="32" rx="16" fill="#DBEAFE"/>
  <rect x="954" y="458" width="62" height="32" rx="16" fill="#E2E8F0"/>
  <rect x="852" y="500" width="126" height="32" rx="16" fill="#D7F8EE"/>
  <text x="882" y="479" class="chipText">Read</text>
  <text x="968" y="479" class="chipText">No</text>
  <text x="879" y="521" class="chipText">Grant needed</text>

  <rect x="1080" y="330" width="144" height="250" rx="28" class="panel"/>
  <text x="1114" y="374" class="cardTitle">Grants</text>
  <rect x="1102" y="406" width="100" height="34" rx="17" fill="#D7F8EE"/>
  <rect x="1102" y="452" width="100" height="34" rx="17" fill="#DBEAFE"/>
  <rect x="1102" y="498" width="100" height="34" rx="17" fill="#E2E8F0"/>
  <rect x="1102" y="544" width="100" height="34" rx="17" fill="#FEF3C7"/>
  <text x="1130" y="428" class="chipText">upload</text>
  <text x="1140" y="474" class="chipText">share</text>
  <text x="1135" y="520" class="chipText">manage</text>
  <text x="1145" y="566" class="chipText">view</text>

  <text x="1062" y="625" class="body">`view` is stored today, but read access</text>
  <text x="1072" y="645" class="body">already follows organization membership.</text>
</svg>
