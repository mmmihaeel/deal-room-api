<svg width="1000" height="480" viewBox="0 0 1000 480" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="480" rx="20" fill="#0b0e14"/>
    <rect x="20" y="20" width="960" height="440" rx="16" stroke="#1f2937" stroke-width="2"/>

    <text x="45" y="70" fill="white" font-family="sans-serif" font-weight="bold" font-size="28">Access model and security flow</text>
    <text x="45" y="95" fill="#9ca3af" font-family="sans-serif" font-size="14">Membership sets the boundary. Roles, room grants, and share-link checks narrow the outcome.</text>

    <!-- Step Boxes -->
    <g transform="translate(50, 140)">
        <!-- Connecting Lines -->
        <line x1="180" y1="35" x2="205" y2="35" stroke="#374151" stroke-width="2"/>
        <line x1="360" y1="35" x2="385" y2="35" stroke="#374151" stroke-width="2"/>
        <line x1="540" y1="35" x2="565" y2="35" stroke="#374151" stroke-width="2"/>

        <!-- Step 1 -->
        <rect width="180" height="70" rx="12" stroke="#134e4a" stroke-width="2" fill="#111827"/>
        <text x="90" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STEP 1</text>
        <text x="90" y="50" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Organization member</text>

        <!-- Step 2 -->
        <g transform="translate(205, 0)">
            <rect width="155" height="70" rx="12" stroke="#1e3a8a" stroke-width="2" fill="#111827"/>
            <text x="77.5" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STEP 2</text>
            <text x="77.5" y="50" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Role baseline</text>
        </g>

        <!-- Step 3 -->
        <g transform="translate(385, 0)">
            <rect width="155" height="70" rx="12" stroke="#1f2937" stroke-width="2" fill="#111827"/>
            <text x="77.5" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STEP 3</text>
            <text x="77.5" y="50" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Room grant</text>
        </g>

        <!-- Step 4 -->
        <g transform="translate(565, 0)">
            <rect width="205" height="70" rx="12" stroke="#7c2d12" stroke-width="2" fill="#111827"/>
            <text x="102.5" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">STEP 4</text>
            <text x="102.5" y="50" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Share-link rules</text>
        </g>
    </g>

    <!-- Role Cards -->
    <g transform="translate(50, 260)">
        <!-- Owner -->
        <rect width="165" height="150" rx="16" fill="#111827" stroke="#1f2937"/>
        <text x="82.5" y="35" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Owner</text>
        <rect x="20" y="70" width="50" height="25" rx="12" stroke="#134e4a" fill="#0f172a"/>
        <text x="45" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Org</text>
        <rect x="80" y="70" width="55" height="25" rx="12" stroke="#7c2d12" fill="#0f172a"/>
        <text x="107.5" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Audit</text>
        <rect x="20" y="105" width="60" height="25" rx="12" stroke="#1f2937" fill="#0f172a"/>
        <text x="50" y="117.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Share</text>

        <!-- Admin -->
        <g transform="translate(180, 0)">
            <rect width="165" height="150" rx="16" fill="#111827" stroke="#1f2937"/>
            <text x="82.5" y="35" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Admin</text>
            <rect x="20" y="70" width="85" height="25" rx="12" stroke="#134e4a" fill="#0f172a"/>
            <text x="62.5" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Members</text>
            <rect x="110" y="70" width="45" height="25" rx="12" stroke="#1e3a8a" fill="#0f172a"/>
            <text x="132.5" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Rooms</text>
            <rect x="20" y="105" width="75" height="25" rx="12" stroke="#1f2937" fill="#0f172a"/>
            <text x="57.5" y="117.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Docs</text>
        </g>

        <!-- Member -->
        <g transform="translate(360, 0)">
            <rect width="165" height="150" rx="16" fill="#111827" stroke="#1f2937"/>
            <text x="82.5" y="35" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Member</text>
            <rect x="20" y="70" width="50" height="25" rx="12" stroke="#1e3a8a" fill="#0f172a"/>
            <text x="45" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Read</text>
            <rect x="80" y="70" width="50" height="25" rx="12" stroke="#1f2937" fill="#0f172a"/>
            <text x="105" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Write</text>
            <rect x="20" y="105" width="55" height="25" rx="12" stroke="#134e4a" fill="#0f172a"/>
            <text x="47.5" y="117.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Share</text>
        </g>

        <!-- Viewer -->
        <g transform="translate(540, 0)">
            <rect width="165" height="150" rx="16" fill="#111827" stroke="#1f2937"/>
            <text x="82.5" y="35" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Viewer</text>
            <rect x="20" y="70" width="50" height="25" rx="12" stroke="#1e3a8a" fill="#0f172a"/>
            <text x="45" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Read</text>
            <rect x="80" y="70" width="40" height="25" rx="12" stroke="#1f2937" fill="#0f172a"/>
            <text x="100" y="82.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">No</text>
            <rect x="20" y="105" width="85" height="25" rx="12" stroke="#134e4a" fill="#0f172a"/>
            <text x="62.5" y="117.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">Grant needed</text>
        </g>

        <!-- Grants -->
        <g transform="translate(720, 0)">
            <rect width="135" height="150" rx="16" fill="#111827" stroke="#1f2937"/>
            <text x="67.5" y="35" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Grants</text>
            <rect x="20" y="60" width="95" height="25" rx="12" stroke="#134e4a" fill="#0f172a"/>
            <text x="67.5" y="72.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">upload</text>
            <rect x="20" y="90" width="95" height="25" rx="12" stroke="#1e3a8a" fill="#0f172a"/>
            <text x="67.5" y="102.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">share</text>
            <rect x="20" y="120" width="95" height="25" rx="12" stroke="#1f2937" fill="#0f172a"/>
            <text x="67.5" y="132.5" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">manage</text>
        </g>
    </g>
</svg>
