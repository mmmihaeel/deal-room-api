<svg width="1000" height="400" viewBox="0 0 1000 400" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="400" rx="20" fill="#0b0e14"/>
    <rect x="20" y="20" width="960" height="360" rx="16" stroke="#1f2937" stroke-width="2"/>

    <text x="45" y="60" fill="white" font-family="sans-serif" font-weight="bold" font-size="28">Domain overview</text>
    <text x="45" y="85" fill="#9ca3af" font-family="sans-serif" font-size="14">Tenant scope drives memberships, rooms, documents, sharing, and audit visibility.</text>

    <!-- Level 1 Nodes -->
    <g transform="translate(50, 130)">
        <!-- User -->
        <rect width="130" height="70" rx="12" fill="#111827" stroke="#1e3a8a" stroke-width="2"/>
        <text x="65" y="30" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">User</text>
        <text x="65" y="48" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">authenticated actor</text>

        <!-- Membership -->
        <line x1="130" y1="35" x2="155" y2="35" stroke="#4b5563" stroke-width="2"/>
        <g transform="translate(155, 0)">
            <rect width="135" height="70" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
            <text x="67.5" y="30" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Membership</text>
            <text x="67.5" y="48" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">role baseline</text>
        </g>

        <!-- Organization -->
        <line x1="290" y1="35" x2="320" y2="35" stroke="#4b5563" stroke-width="2"/>
        <g transform="translate(320, -10)">
            <rect width="180" height="90" rx="16" fill="#111827" stroke="#134e4a" stroke-width="2"/>
            <text x="90" y="25" fill="#94a3b8" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">TENANT BOUNDARY</text>
            <text x="90" y="48" fill="white" font-family="sans-serif" font-weight="bold" font-size="20" text-anchor="middle">Organization</text>
            <text x="90" y="68" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">scope for protected records</text>
        </g>

        <!-- AuditLog -->
        <line x1="500" y1="35" x2="535" y2="35" stroke="#4b5563" stroke-width="2"/>
        <g transform="translate(535, 0)">
            <rect width="140" height="70" rx="12" fill="#111827" stroke="#7c2d12" stroke-width="2"/>
            <text x="70" y="30" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">AuditLog</text>
            <text x="70" y="48" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">append-only traceability</text>
        </g>
    </g>

    <!-- Level 2: DealSpace -->
    <g transform="translate(350, 245)">
        <line x1="60" y1="-35" x2="60" y2="0" stroke="#4b5563" stroke-width="2"/>
        <rect width="130" height="65" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
        <text x="65" y="28" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">DealSpace</text>
        <text x="65" y="45" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">room inside one org</text>
    </g>

    <!-- Bottom Leaves -->
    <g transform="translate(100, 330)">
        <path d="M315,-20 L-15,0" stroke="#4b5563" stroke-width="2" fill="none"/>
        <path d="M315,-20 L160,0" stroke="#4b5563" stroke-width="2" fill="none"/>
        <path d="M315,-20 L480,0" stroke="#4b5563" stroke-width="2" fill="none"/>
        <path d="M315,-20 L675,0" stroke="#4b5563" stroke-width="2" fill="none"/>

        <rect x="-15" width="120" height="35" rx="10" fill="#111827" stroke="#374151"/>
        <text x="45" y="17.5" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="central">Folder</text>

        <rect x="155" width="125" height="35" rx="10" fill="#111827" stroke="#374151"/>
        <text x="217.5" y="17.5" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="central">Document</text>

        <rect x="475" width="140" height="35" rx="10" fill="#111827" stroke="#374151"/>
        <text x="545" y="17.5" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="central">Room grant</text>

        <rect x="670" width="130" height="35" rx="10" fill="#111827" stroke="#374151"/>
        <text x="735" y="17.5" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="central">ShareLink</text>
    </g>
</svg>
