<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="420" rx="20" fill="#0b0e14"/>
    <rect x="20" y="20" width="960" height="380" rx="16" stroke="#1f2937" stroke-width="2"/>

    <text x="45" y="65" fill="white" font-family="sans-serif" font-weight="bold" font-size="28">Request flow</text>
    <text x="45" y="90" fill="#9ca3af" font-family="sans-serif" font-size="14">Validation, authorization, domain logic, cache access, and audit events stay visible in one request path.</text>

    <!-- Main Flow -->
    <g transform="translate(40, 150)">
        <!-- Entry -->
        <rect width="100" height="75" rx="12" fill="#111827" stroke="#1e3a8a" stroke-width="2"/>
        <text x="50" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">ENTRY</text>
        <text x="50" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Client</text>

        <line x1="100" y1="37.5" x2="125" y2="37.5" stroke="#4b5563" stroke-width="2"/>

        <!-- Route -->
        <g transform="translate(125, 0)">
            <rect width="150" height="75" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
            <text x="75" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">ROUTE</text>
            <text x="75" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Throttle + Route</text>
        </g>

        <line x1="275" y1="37.5" x2="300" y2="37.5" stroke="#4b5563" stroke-width="2"/>

        <!-- Guard -->
        <g transform="translate(300, 0)">
            <rect width="140" height="75" rx="12" fill="#111827" stroke="#134e4a" stroke-width="2"/>
            <text x="70" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">GUARD</text>
            <text x="70" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Form Request</text>
        </g>

        <line x1="440" y1="37.5" x2="465" y2="37.5" stroke="#4b5563" stroke-width="2"/>

        <!-- Access - INCREASED WIDTH -->
        <g transform="translate(465, 0)">
            <rect width="190" height="75" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
            <text x="95" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">ACCESS</text>
            <text x="95" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">Policy + Auth Service</text>
        </g>

        <line x1="655" y1="37.5" x2="680" y2="37.5" stroke="#4b5563" stroke-width="2"/>

        <!-- Domain -->
        <g transform="translate(680, 0)">
            <rect width="120" height="75" rx="12" fill="#111827" stroke="#374151" stroke-width="2"/>
            <text x="60" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">DOMAIN</text>
            <text x="60" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Controller</text>

            <!-- Clean convergence for sub-connections -->
            <path d="M60,75 L-20,130" stroke="#4b5563" stroke-width="1.5" fill="none"/>
            <path d="M60,75 L60,130" stroke="#4b5563" stroke-width="1.5" fill="none"/>
            <path d="M60,75 L140,130" stroke="#4b5563" stroke-width="1.5" fill="none"/>

            <g transform="translate(-75, 130)">
                <rect width="110" height="40" rx="12" fill="#111827" stroke="#374151"/>
                <text x="55" y="20" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" dominant-baseline="central">MySQL</text>
            </g>
            <g transform="translate(20, 130)">
                <rect width="80" height="40" rx="12" fill="#111827" stroke="#374151"/>
                <text x="40" y="20" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" dominant-baseline="central">Redis</text>
            </g>
            <g transform="translate(105, 130)">
                <rect width="80" height="40" rx="12" fill="#111827" stroke="#374151"/>
                <text x="40" y="20" fill="white" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" dominant-baseline="central">Audit</text>
            </g>
        </g>

        <line x1="800" y1="37.5" x2="825" y2="37.5" stroke="#4b5563" stroke-width="2"/>

        <!-- Output -->
        <g transform="translate(825, 0)">
            <rect width="110" height="75" rx="12" fill="#111827" stroke="#7c2d12" stroke-width="2"/>
            <text x="55" y="25" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">OUTPUT</text>
            <text x="55" y="52" fill="white" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Response</text>
        </g>
    </g>

    <!-- Legend -->
    <g transform="translate(45, 345)">
        <rect width="80" height="26" rx="13" stroke="#134e4a" fill="#0f172a"/>
        <text x="40" y="13" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">validate</text>

        <rect x="90" width="85" height="26" rx="13" stroke="#1e3a8a" fill="#0f172a"/>
        <text x="132.5" y="13" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">authorize</text>

        <rect x="185" width="75" height="26" rx="13" stroke="#4c1d95" fill="#0f172a"/>
        <text x="222.5" y="13" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">cache</text>

        <rect x="270" width="70" height="26" rx="13" stroke="#7c2d12" fill="#0f172a"/>
        <text x="305" y="13" fill="white" font-family="sans-serif" font-size="11" text-anchor="middle" dominant-baseline="central">audit</text>
    </g>
</svg>
